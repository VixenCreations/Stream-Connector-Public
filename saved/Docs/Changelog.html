    "7.3.0": [
        "FIX: Clear Queue now forces an immediate, full stop on every connected device (Intiface, PiShock, and OwO), including long-running and parallel patterns. Previously some outputs, notably a PiShock pattern set to a long duration, could keep running out their full time after you cleared; now every running action checks for the stop and halts within a fraction of a second, and the app actively tells each device to stop.",

        "FEATURE: The app now checks for updates on launch. If a newer version is available you get a non-blocking 'Update Available' notice with a one-click link to download. It is a plain, unauthenticated check of a small version file on the website and sends none of your data.",
        "FEATURE: New Changelog button in the Support tab opens the online changelog in your browser.",
        "IMPROVEMENT: Support Docs now open the online documentation in your browser, and the app opens on the OSC Controls tab by default.",
        "DEV: Unified hard-cancel across every hardware runner (chain executor, PiShock parallel and special-mode workers, and OwO pattern runner) via a per-client cancel generation that each runner polls (about 100 ms); Clear Queue's stop now covers Intiface, PiShock, and OwO. This fixes orphaned PiShock parallel workers that previously ran their full duration after a clear. Connection-lifecycle events are routed to deduped status logging instead of the visible log box. The embedded local docs web server was removed, so Support Docs and the changelog open the online site. The launch update check reads a small version.json from the site (throttled to about once a day, silent when offline).",
        "DEV: Application version bumped to 7.3.0 across the executable manifest and version info (MINOR - feature addition)."
    ],
    "7.2.0": [
        "FEATURE: New Manage Filters window - open it from the OSC Controls tab (the 'Manage Filters' button next to 'Filter Selected') to browse, search, add, and remove the parameter filters the app uses to mute chatty or tracking-only OSC. Pick a category (three Noisy buckets and two Nuclear buckets), search within it, add a pattern with Enter, remove selected rows, and double-click a noisy row to toggle whether it is sanitized. Changes take effect right away, no restart needed.",
        "IMPROVEMENT: Your OSC filters now live in a single filters database (filters.db) instead of two separate JSON files. This means fewer disk reads and writes while the app is running (nothing is re-read from disk on every incoming OSC message anymore), which keeps things a touch lighter and reduces the app's on-disk footprint. Your existing filter files are imported automatically on first launch and kept as .migrated backups.",
        "FIX: Backup (.bak) copies of your chain and control-layout files are now saved into their proper 'backup' folders (for example VixForge Haptics Nexus\\saved\\controls\\chains\\backup) instead of being dropped next to the live files. Your working folders stay clean.",
        "DEV: New FilterStore (plaintext SQLite, WAL) replaces noisy_parameters.json / nuclear.json; the noisy filter is now cache-first (removed a per-message getmtime syscall from the OSC hot path) and the nuclear filter no longer runs a watchdog file-watcher (a module-level reload hook is used instead). New _backup_file() helper routes all .bak copies into sibling backup/ folders with timestamped names.",
        "DEV: Application version bumped to 7.2.0 across the executable manifest and version info (MINOR - feature addition)."

        "IMPROVEMENT: The Rich Presence is edition-aware - each edition uses its own Discord app and its own logo, so Stream Connector and VixForge Haptics Nexus each appear with the correct name and icon.",
        "FEATURE: Discord Rich Presence can be turned on or off in the app under Configuration → Edit Config with the 'Show Discord Rich Presence' checkbox; the change takes effect immediately. You can also hide it from Discord's own Activity Privacy settings, or simply not run Discord.",

    "7.0.0": [
        "FEATURE: New Custom OSC trigger - point a chain at ANY incoming OSC parameter (not just the built-in SPS / OGB touch contacts) and drive every enabled output from it. Add a row per parameter with a '+ Add Parameter' button, just like the pattern editor.",

<script>
const container = document.getElementById("log");
const search = document.getElementById("q");

function render(filter = "") {
  container.innerHTML = "";
  const q = filter.toLowerCase();

  for (const [version, entries] of Object.entries(CHANGELOG)) {
    const block = document.createElement("section");
    block.className = "ver";

    const h = document.createElement("h2");
    h.innerHTML = `Version ${version} <span class="badge">${entries.length} items</span>`;
    block.appendChild(h);

    const ul = document.createElement("ul");

    let show = false;
    for (const line of entries) {
      if (!q || line.toLowerCase().includes(q)) {
        show = true;
        const li = document.createElement("li");
        li.textContent = line;
        ul.appendChild(li);
      }
    }

    if (show) {
      block.appendChild(ul);
      container.appendChild(block);
    }
  }
}

search.addEventListener("input", () => render(search.value));
render();
</script>
